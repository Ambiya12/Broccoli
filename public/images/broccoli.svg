<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" width="200" height="240">
  <!-- Stem -->
  <rect x="75" y="140" width="50" height="80" rx="12" fill="#7ac74f" stroke="#2d5016" stroke-width="3"/>
  <ellipse cx="100" cy="140" rx="25" ry="15" fill="#7ac74f" stroke="#2d5016" stroke-width="3"/>
  
  <!-- Face -->
  <circle cx="100" cy="155" r="18" fill="#9ee54a" stroke="#2d5016" stroke-width="3"/>
  
  <!-- Left eye -->
  <circle cx="90" cy="150" r="4" fill="#2d5016"/>
  <circle cx="90" cy="152" r="1.5" fill="#fff"/>
  
  <!-- Right eye -->
  <circle cx="110" cy="150" r="4" fill="#2d5016"/>
  <circle cx="110" cy="152" r="1.5" fill="#fff"/>
  
  <!-- Smile -->
  <path d="M 95 160 Q 100 163 105 160" stroke="#2d5016" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Main florets (top) -->
  <g>
    <!-- Center floret (back) -->
    <ellipse cx="100" cy="70" rx="35" ry="40" fill="#4a9e4a" stroke="#2d5016" stroke-width="2.5"/>
    <circle cx="100" cy="50" r="8" fill="#5fb85f"/>
    
    <!-- Top left floret -->
    <ellipse cx="75" cy="50" rx="32" ry="38" fill="#5fb85f" stroke="#2d5016" stroke-width="2.5"/>
    <circle cx="60" cy="30" r="8" fill="#4a9e4a"/>
    
    <!-- Top right floret -->
    <ellipse cx="125" cy="50" rx="32" ry="38" fill="#5fb85f" stroke="#2d5016" stroke-width="2.5"/>
    <circle cx="140" cy="30" r="8" fill="#4a9e4a"/>
    
    <!-- Left floret -->
    <ellipse cx="45" cy="90" rx="30" ry="35" fill="#5fb85f" stroke="#2d5016" stroke-width="2.5"/>
    <circle cx="30" cy="75" r="8" fill="#4a9e4a"/>
    
    <!-- Right floret -->
    <ellipse cx="155" cy="90" rx="30" ry="35" fill="#5fb85f" stroke="#2d5016" stroke-width="2.5"/>
    <circle cx="170" cy="75" r="8" fill="#4a9e4a"/>
    
    <!-- Bottom left floret -->
    <ellipse cx="65" cy="115" rx="28" ry="32" fill="#4a9e4a" stroke="#2d5016" stroke-width="2.5"/>
    <circle cx="55" cy="140" r="7" fill="#5fb85f"/>
    
    <!-- Bottom right floret -->
    <ellipse cx="135" cy="115" rx="28" ry="32" fill="#4a9e4a" stroke="#2d5016" stroke-width="2.5"/>
    <circle cx="145" cy="140" r="7" fill="#5fb85f"/>
  </g>
  
  <!-- Decorative texture lines -->
  <path d="M 95 60 Q 100 55 105 60" stroke="#2d5016" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M 75 80 Q 78 75 82 80" stroke="#2d5016" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M 120 85 Q 125 80 130 85" stroke="#2d5016" stroke-width="1.5" fill="none" opacity="0.3"/>
</svg>
