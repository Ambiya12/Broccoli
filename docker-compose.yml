services:
  app:
    build: .
    ports:
      - "8000:80"
    environment:
      DB_HOST: db
      DB_NAME: Broccoli
      DB_USER: root
      DB_PASSWORD: rootpassword
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - vendor_cache:/var/www/html/vendor

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: Broccoli
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  mysql_data:
  vendor_cache:
